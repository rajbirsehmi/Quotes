name: Android UI Tests

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17" # Fixed: 'version' should be 'java-version'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant permission for Gradle
        run: chmod +x gradlew # Fixed: '-x' removes permission, '+x' grants it

      - name: Run UI Test on Managed Device
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30 # Fixed: 'api-version' should be 'api-level'
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedCheck

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: espresso-test-reports
          path: app/build/reports/androidTests/connected/